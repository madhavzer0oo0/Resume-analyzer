<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-2">📄 Resume Analyzer</h1>
    <p class="text-center text-gray-500 mb-8">Get ATS score, skill gaps & improvement tips</p>

    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <div>
        <label class="font-semibold">Upload Resume (PDF or DOCX)</label>
        <input type="file" id="resume" accept=".pdf,.docx"
          class="mt-1 block w-full border rounded p-2"/>
      </div>
      <div>
        <label class="font-semibold">Paste Job Description</label>
        <textarea id="jd" rows="6" placeholder="Paste the job description here..."
          class="mt-1 block w-full border rounded p-2 text-sm"></textarea>
      </div>
      <button onclick="analyze()"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">
        Analyze Resume
      </button>
    </div>

    <div id="results" class="mt-8 hidden space-y-4"></div>
  </div>

  <script>
    async function analyze() {
      const file = document.getElementById("resume").files[0];
      const jd = document.getElementById("jd").value;
      if (!file || !jd) return alert("Please upload a resume and paste a job description.");

      const formData = new FormData();
      formData.append("resume", file);
      formData.append("job_description", jd);

      document.getElementById("results").innerHTML = `<p class="text-center text-gray-500">Analyzing... ⏳</p>`;
      document.getElementById("results").classList.remove("hidden");

      const res = await fetch("/analyze", { method: "POST", body: formData });
      const data = await res.json();
      if (data.error) return alert("Error: " + data.error);

      document.getElementById("results").innerHTML = `
        <div class="bg-white rounded-xl shadow p-6">
          <h2 class="text-xl font-bold mb-4">📊 ATS Score: <span class="text-blue-600">${data.ats_score}/100</span></h2>
          <div class="w-full bg-gray-200 rounded-full h-3 mb-6">
            <div class="bg-blue-600 h-3 rounded-full" style="width:${data.ats_score}%"></div>
          </div>
          <h3 class="font-semibold text-green-600 mb-2">✅ Matched Skills</h3>
          <div class="flex flex-wrap gap-2 mb-4">${data.matched_skills.map(s => `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm">${s}</span>`).join("")}</div>
          <h3 class="font-semibold text-red-500 mb-2">❌ Missing Skills</h3>
          <div class="flex flex-wrap gap-2 mb-4">${data.missing_skills.map(s => `<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-sm">${s}</span>`).join("")}</div>
          <h3 class="font-semibold mb-2">💡 Improvement Tips</h3>
          <ul class="list-disc ml-5 space-y-1 text-sm text-gray-700">${data.improvement_tips.map(t => `<li>${t}</li>`).join("")}</ul>
          <h3 class="font-semibold mt-4 mb-1">📝 Overall Feedback</h3>
          <p class="text-sm text-gray-600">${data.overall_feedback}</p>
        </div>`;
    }
  </script>
</body>
</html>
